services:

  # ── Production build ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: admetrics-app
    ports:
      - "80:80"
    restart: unless-stopped
    profiles:
      - prod

  # ── Local development with hot reload ─────────────────────────────────────
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: admetrics-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    profiles:
      - dev